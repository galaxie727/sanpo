<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>チー散歩</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
    background: #000;
  }

  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    color: #fff;
  }

  /* 背景画像 */
  #bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 0;
  }

  /* 上の暗めグラデ */
  .top-fade {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(0,0,0,0.45) 0%,
        rgba(0,0,0,0.15) 20%,
        rgba(0,0,0,0.00) 45%,
        rgba(0,0,0,0.05) 70%,
        rgba(0,0,0,0.35) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* 吹き出しエリア */
  #messageWrap {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 18px);
    left: 16px;
    right: 16px;
    z-index: 3;
    display: flex;
    justify-content: center;
  }

  #bubble {
    position: relative;
    max-width: 92%;
    min-height: 72px;
    padding: 16px 18px;
    border-radius: 20px;
    background: rgba(255,255,255,0.88);
    color: #111;
    font-size: 26px;
    line-height: 1.55;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  #bubble::after {
    content: "";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: -12px;
    border-width: 12px 10px 0 10px;
    border-style: solid;
    border-color: rgba(255,255,255,0.88) transparent transparent transparent;
  }

  /* 下部UI */
  #bottomUI {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding:
      12px 14px
      calc(env(safe-area-inset-bottom) + 18px)
      14px;
    z-index: 4;
  }

  #choices {
    display: grid;
    gap: 10px;
  }

  .choice-btn {
    width: 100%;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 18px;
    padding: 16px 14px;
    font-size: 22px;
    color: #fff;
    background: rgba(255,255,255,0.16);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    cursor: pointer;
  }

  .choice-btn:active {
    transform: scale(0.98);
    background: rgba(255,255,255,0.24);
  }

  /* スマホで少しだけ調整 */
  @media (max-width: 480px) {
    #bubble {
      font-size: 23px;
      padding: 15px 16px;
    }

    .choice-btn {
      font-size: 20px;
      padding: 15px 12px;
    }
  }
</style>
</head>
<body>
<div id="game">
  <img id="bg" src="girl.png" alt="girl" />
  <div class="top-fade"></div>

  <div id="messageWrap">
    <div id="bubble">こんにちは。　チー散歩する？</div>
  </div>

  <div id="bottomUI">
    <div id="choices">
      <button class="choice-btn" onclick="nextScene(1)">する</button>
      <button class="choice-btn" onclick="nextScene(2)">しない</button>
    </div>
  </div>
</div>

<script>
  let scene = 0;

  function setMessage(text) {
    document.getElementById("bubble").innerHTML = text;
  }

  function setChoices(buttons) {
    const choices = document.getElementById("choices");
    choices.innerHTML = buttons.map(btn => {
      return `<button class="choice-btn" onclick="${btn.onclick}">${btn.label}</button>`;
    }).join("");
  }

  function nextScene(choice) {
    if (scene === 0) {
      if (choice === 1) {
        setMessage("じゃあ少し歩こう。<br>どこに行く？");
        setChoices([
          { label: "公園", onclick: "nextScene(3)" },
          { label: "カフェ", onclick: "nextScene(4)" },
          { label: "夜道", onclick: "nextScene(5)" }
        ]);
        scene = 1;
      } else if (choice === 2) {
        setMessage("そっか。<br>また今度ね。");
        setChoices([
          { label: "最初に戻る", onclick: "location.reload()" }
        ]);
      }
      return;
    }

    if (scene === 1) {
      if (choice === 3) {
        setMessage("公園いいね。<br>静かで落ち着く。");
      } else if (choice === 4) {
        setMessage("カフェ行こ。<br>甘いの好き？");
      } else if (choice === 5) {
        setMessage("夜道ってちょっとドキドキするね。");
      }

      setChoices([
        { label: "もう一回", onclick: "location.reload()" }
      ]);
    }
  }
</script>
</body>
</html>
