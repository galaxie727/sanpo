<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>チー散歩</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    font-family: sans-serif;
    overflow: hidden;
  }

  #game {
    position: relative;
    width: 100vw;
    height: 100dvh; /* ← iPhone Safari対策 */
    min-height: 100dvh;
    overflow: hidden;
    color: #fff;
    background: #000;
  }

  #bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 0;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.28) 0%,
      rgba(0,0,0,0.05) 35%,
      rgba(0,0,0,0.08) 65%,
      rgba(0,0,0,0.38) 100%
    );
    z-index: 1;
    pointer-events: none;
  }

  #messageWrap {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 14px);
    left: 14px;
    right: 14px;
    z-index: 3;
    display: flex;
    justify-content: center;
  }

  #bubble {
    position: relative;
    width: 100%;
    max-width: 640px;
    padding: 16px 18px;
    border-radius: 22px;
    background: rgba(255,255,255,0.92);
    color: #111;
    font-size: 20px;
    line-height: 1.6;
    text-align: center;
    box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  #bubble::after {
    content: "";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: -12px;
    border-width: 12px 10px 0 10px;
    border-style: solid;
    border-color: rgba(255,255,255,0.92) transparent transparent transparent;
  }

  #bottomUI {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 4;
    padding: 12px 14px calc(env(safe-area-inset-bottom) + 22px);
  }

  #choices {
    display: grid;
    gap: 10px;
    max-width: 640px;
    margin: 0 auto;
  }

  .choice-btn {
    width: 100%;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 18px;
    padding: 15px 14px;
    font-size: 18px;
    color: #fff;
    background: rgba(255,255,255,0.16);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    cursor: pointer;
  }

  .choice-btn:active {
    transform: scale(0.98);
    background: rgba(255,255,255,0.24);
  }

  @media (max-width: 480px) {
    #bubble {
      font-size: 18px;
      padding: 14px 14px;
    }

    .choice-btn {
      font-size: 17px;
      padding: 14px 12px;
    }
  }
</style>
</head>
<body>
<div id="game">
  <img id="bg" src="girl.png" alt="girl">
  <div class="overlay"></div>

  <div id="messageWrap">
    <div id="bubble">こんにちは。 チー散歩する？</div>
  </div>

  <div id="bottomUI">
    <div id="choices">
      <button class="choice-btn" onclick="nextScene(1)">する</button>
      <button class="choice-btn" onclick="nextScene(2)">しない</button>
    </div>
  </div>
</div>

<script>
  let scene = 0;

  function setMessage(text) {
    document.getElementById("bubble").innerHTML = text;
  }

  function setChoices(buttons) {
    const choices = document.getElementById("choices");
    choices.innerHTML = buttons.map(btn =>
      `<button class="choice-btn" onclick="${btn.onclick}">${btn.label}</button>`
    ).join("");
  }

  function nextScene(choice) {
    if (scene === 0) {
      if (choice === 1) {
        setMessage("じゃあ少し歩こう。<br>どこに行く？");
        setChoices([
          { label: "公園", onclick: "nextScene(3)" },
          { label: "カフェ", onclick: "nextScene(4)" },
          { label: "夜道", onclick: "nextScene(5)" }
        ]);
        scene = 1;
      } else if (choice === 2) {
        setMessage("そっか。<br>また今度ね。");
        setChoices([
          { label: "最初に戻る", onclick: "location.reload()" }
        ]);
      }
      return;
    }

    if (scene === 1) {
      if (choice === 3) {
        setMessage("公園いいね。<br>静かで落ち着く。");
      } else if (choice === 4) {
        setMessage("カフェ行こ。<br>甘いの好き？");
      } else if (choice === 5) {
        setMessage("夜道ってちょっとドキドキするね。");
      }

      setChoices([
        { label: "もう一回", onclick: "location.reload()" }
      ]);
    }
  }
</script>
</body>
</html>
