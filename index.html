<script>
  const bg = document.getElementById("bg");
  const girl = document.getElementById("girl");
  const bubble = document.getElementById("bubble");
  const choices = document.getElementById("choices");

  let scene = "selectGirl";
  let currentGirl = "girlA"; // ← ここ重要

  function setGirl(no) {
    girl.style.opacity = 0;
    setTimeout(() => {
      girl.src = `${currentGirl}/${currentGirl}_0${no}.png`;
      girl.onload = () => girl.style.opacity = 1;
    }, 80);
  }

  function setMessage(text) {
    bubble.innerHTML = text;
  }

  function setChoices(buttons) {
    choices.innerHTML = buttons.map(btn =>
      `<button class="choice-btn" onclick="${btn.onclick}">${btn.label}</button>`
    ).join("");
  }

  function resetGame() {
    scene = "selectGirl";
    setMessage("誰とチー散歩する？");
    setChoices([
      { label: "girlA", onclick: "selectGirl('girlA')" },
      { label: "girlB", onclick: "selectGirl('girlB')" },
      { label: "girlC", onclick: "selectGirl('girlC')" }
    ]);
  }

  function selectGirl(name) {
    currentGirl = name;
    scene = "start";

    setGirl(1);
    setMessage("こんにちは。<br>チー散歩する？");

    setChoices([
      { label: "する", onclick: "nextScene('yes')" },
      { label: "しない", onclick: "nextScene('no')" }
    ]);
  }

  function endScene(text) {
    setGirl(5);
    setMessage(text);
    setChoices([
      { label: "最初に戻る", onclick: "resetGame()" }
    ]);
  }

  function nextScene(choice) {

    if (scene === "start") {
      if (choice === "yes") {
        scene = "place";

        setGirl(2);
        setMessage("どこに行く？");

        setChoices([
          { label: "公園", onclick: "nextScene('park')" },
          { label: "カフェ", onclick: "nextScene('cafe')" },
          { label: "夜道", onclick: "nextScene('night')" }
        ]);
      } else {
        endScene("そっか。また今度ね。");
      }
      return;
    }

    if (scene === "place") {
      if (choice === "park") {
        setGirl(3);
        endScene("公園いいね。静かで落ち着く。");
      }

      if (choice === "cafe") {
        setGirl(4);
        endScene("カフェ行こ。甘いの好き？");
      }

      if (choice === "night") {
        setGirl(5);
        endScene("夜道ってちょっとドキドキするね。");
      }
    }
  }

  resetGame();
</script>
